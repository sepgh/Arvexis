server.port=8080

# SQLite data source (startup editor database)
spring.datasource.url=jdbc:sqlite:${editor.db.path:${user.home}/.engine-editor/editor.db}
spring.datasource.driver-class-name=org.sqlite.JDBC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Pre-release: wipe and recreate the DB whenever the schema changes
spring.flyway.clean-on-validation-error=true
spring.flyway.clean-disabled=false

# Logging
# Override via CLI: --logging.level.com.engine.editor=DEBUG
logging.level.com.engine.editor=INFO
# Log file directory (default: ~/.engine-editor/logs)
# Override via CLI: --editor.log.path=/custom/path
editor.log.path=${user.home}/.engine-editor/logs
