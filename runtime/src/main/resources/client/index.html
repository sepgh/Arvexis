<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Interactive Video</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Video container ── */
    #stage {
      position: relative;
      width: 100%;
      height: 100dvh;
      background: #000;
    }

    #videoEl, #transitionEl {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    #transitionEl {
      opacity: 0;
      transition: opacity 0.05s;
      z-index: 2;
    }
    #transitionEl.active { opacity: 1; }

    /* Freeze frame canvas sits over the video */
    #freezeCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
      z-index: 3;
    }

    /* ── Decision overlay ── */
    #decisionOverlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 7vh;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
    }
    #decisionOverlay.visible {
      pointer-events: all;
      opacity: 1;
    }

    #decisionButtons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 480px;
      padding: 0 20px;
    }

    .decision-btn {
      padding: 14px 20px;
      border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.25);
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(8px);
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .decision-btn:hover  { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.6); }
    .decision-btn:active { transform: scale(0.97); }
    .decision-btn.default { border-color: rgba(99,179,237,0.6); }

    /* ── Countdown timer ── */
    #countdown {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 12;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      color: rgba(255,255,255,0.6);
      display: none;
    }
    #countdown.visible { display: block; }

    #countdownArc {
      display: inline-block;
      vertical-align: middle;
      margin-right: 5px;
    }

    /* ── Top bar ── */
    #topBar {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 15;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent);
    }

    #sceneTitle {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    #restartBtn {
      font-size: 11px;
      font-weight: 500;
      padding: 5px 11px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(0,0,0,0.4);
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      transition: background 0.15s;
    }
    #restartBtn:hover { background: rgba(255,255,255,0.15); color: #fff; }

    /* ── Loading / error states ── */
    #spinner {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: #000;
      transition: opacity 0.3s;
    }
    #spinner.hidden { opacity: 0; pointer-events: none; }

    .spinner-ring {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: rgba(255,255,255,0.8);
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #spinnerText { font-size: 13px; color: rgba(255,255,255,0.5); }

    #errorBox {
      position: absolute;
      inset: 0;
      z-index: 25;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: rgba(0,0,0,0.9);
      padding: 24px;
      text-align: center;
    }
    #errorBox.visible { display: flex; }
    #errorMsg { font-size: 14px; color: rgba(255,80,80,0.9); max-width: 480px; }
    #errorRetry {
      padding: 8px 20px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent; color: #fff;
      cursor: pointer; font-size: 13px;
    }
    #errorRetry:hover { background: rgba(255,255,255,0.1); }

    /* ── End screen ── */
    #endScreen {
      position: absolute;
      inset: 0;
      z-index: 18;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: rgba(0,0,0,0.75);
    }
    #endScreen.visible { display: flex; }
    #endTitle { font-size: 28px; font-weight: 700; letter-spacing: 0.02em; }
    #endRestart {
      padding: 12px 32px; border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.08);
      color: #fff; font-size: 15px; font-weight: 500;
      cursor: pointer; transition: background 0.15s;
    }
    #endRestart:hover { background: rgba(255,255,255,0.18); }
  </style>
</head>
<body>

<div id="stage">
  <!-- Main scene video -->
  <video id="videoEl" playsinline webkit-playsinline></video>
  <!-- Transition video (layered on top) -->
  <video id="transitionEl" playsinline webkit-playsinline muted></video>
  <!-- Freeze frame canvas -->
  <canvas id="freezeCanvas"></canvas>

  <!-- Top bar -->
  <div id="topBar">
    <span id="sceneTitle"></span>
    <button id="restartBtn">↺ Restart</button>
  </div>

  <!-- Countdown -->
  <div id="countdown">
    <canvas id="countdownArc" width="18" height="18"></canvas>
    <span id="countdownNum"></span>
  </div>

  <!-- Decision overlay -->
  <div id="decisionOverlay">
    <div id="decisionButtons"></div>
  </div>

  <!-- Loading spinner -->
  <div id="spinner">
    <div class="spinner-ring"></div>
    <span id="spinnerText">Loading…</span>
  </div>

  <!-- Error box -->
  <div id="errorBox">
    <span id="errorMsg"></span>
    <button id="errorRetry">Retry</button>
  </div>

  <!-- End screen -->
  <div id="endScreen">
    <span id="endTitle">The End</span>
    <button id="endRestart">Play Again</button>
  </div>
</div>

<script src="/hls.min.js"></script>
<script src="/game.js"></script>
</body>
</html>
