<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arvexis — Interactive Video</title>
  <link rel="stylesheet" href="/default.css"/>
  <link rel="stylesheet" href="/custom.css"/>
</head>
<body>

<div id="arvexis-root">

  <!-- ══════════════════════════════════════════════════════════════════════
       MAIN MENU — shown on launch; game-like entry point
       ══════════════════════════════════════════════════════════════════════ -->
  <div id="main-menu">
    <h1 class="menu-title">Arvexis</h1>
    <div class="menu-actions">
      <button id="btn-continue" disabled>Continue</button>
      <button id="btn-new-game">New Game</button>
      <button id="btn-menu-settings">Settings</button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════════════
       GAME SCREEN — active gameplay area (hidden while on menu)
       ══════════════════════════════════════════════════════════════════════ -->
  <div id="game-screen" class="hidden">
    <div id="stage">
      <!-- Main scene video -->
      <video id="video-el" playsinline webkit-playsinline></video>
      <!-- Transition video (layered on top) -->
      <video id="transition-el" playsinline webkit-playsinline muted></video>
      <!-- Freeze frame canvas -->
      <canvas id="freeze-canvas"></canvas>

      <!-- Pause button (top-left during gameplay) -->
      <button id="pause-btn" title="Pause">⏸</button>

      <!-- Countdown timer -->
      <div id="countdown">
        <canvas id="countdown-arc" width="18" height="18"></canvas>
        <span id="countdown-num"></span>
      </div>

      <!-- Decision overlay -->
      <div id="decision-overlay">
        <div id="decision-buttons"></div>
      </div>

      <!-- Loading spinner -->
      <div id="spinner">
        <div class="spinner-ring"></div>
        <span id="spinner-text">Loading…</span>
      </div>

      <!-- Error box -->
      <div id="error-box">
        <span id="error-msg"></span>
        <button id="error-retry">Retry</button>
      </div>

      <!-- End screen -->
      <div id="end-screen">
        <span id="end-title">The End</span>
        <button id="end-restart">Play Again</button>
        <button id="end-menu">Main Menu</button>
      </div>
    </div>

    <!-- Background music audio element (hidden) -->
    <audio id="music-el" loop preload="auto"></audio>
  </div>

  <!-- ══════════════════════════════════════════════════════════════════════
       PAUSE OVERLAY — shown when user pauses during gameplay
       ══════════════════════════════════════════════════════════════════════ -->
  <div id="pause-overlay">
    <h2 class="pause-title">Paused</h2>
    <div class="pause-actions">
      <button id="btn-resume">Resume</button>
      <button id="btn-pause-settings">Settings</button>
      <button id="btn-quit-menu">Main Menu</button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════════════
       SETTINGS OVERLAY — accessible from main menu and pause menu
       ══════════════════════════════════════════════════════════════════════ -->
  <div id="settings-overlay">
    <h2 class="settings-title">Settings</h2>
    <div class="settings-body">

      <!-- Music Volume -->
      <div class="settings-group">
        <span class="settings-label">Music Volume</span>
        <div class="settings-control">
          <input type="range" id="setting-music-vol" min="0" max="100" value="70"/>
          <span class="volume-value" id="music-vol-display">70%</span>
        </div>
      </div>

      <!-- Video Volume -->
      <div class="settings-group">
        <span class="settings-label">Video Volume</span>
        <div class="settings-control">
          <input type="range" id="setting-video-vol" min="0" max="100" value="100"/>
          <span class="volume-value" id="video-vol-display">100%</span>
        </div>
      </div>

      <!-- Music On/Off -->
      <div class="settings-group">
        <div class="settings-control">
          <label>
            <input type="checkbox" id="setting-music-enabled" checked/>
            Enable background music
          </label>
        </div>
      </div>

      <!-- Button Background Color -->
      <div class="settings-group">
        <span class="settings-label">Button Background</span>
        <div class="settings-control">
          <input type="color" id="setting-btn-bg" value="#000000"/>
          <span class="volume-value" id="btn-bg-display">#000000</span>
        </div>
      </div>

      <!-- Button Text Color -->
      <div class="settings-group">
        <span class="settings-label">Button Text Color</span>
        <div class="settings-control">
          <input type="color" id="setting-btn-text" value="#ffffff"/>
          <span class="volume-value" id="btn-text-display">#ffffff</span>
        </div>
      </div>

      <!-- Button Position -->
      <div class="settings-group">
        <span class="settings-label">Button Position</span>
        <div class="settings-control">
          <select id="setting-btn-pos">
            <option value="bottom">Bottom</option>
            <option value="center">Center</option>
            <option value="top">Top</option>
          </select>
        </div>
      </div>

      <!-- Resolution (set once) -->
      <div class="settings-group" id="resolution-group">
        <span class="settings-label">Resolution (applied on next scene)</span>
        <div class="settings-control">
          <select id="setting-resolution">
            <option value="auto">Auto</option>
          </select>
        </div>
      </div>

    </div>
    <div class="settings-footer">
      <button id="btn-settings-close">Apply &amp; Close</button>
    </div>
  </div>

</div>

<script src="/hls.min.js"></script>
<script src="/game.js"></script>
</body>
</html>
