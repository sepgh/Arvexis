name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    name: Build editor + runtime JARs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: editor/frontend/package-lock.json

      - name: Build frontend
        run: |
          cd editor/frontend
          npm ci
          npm run build

      - name: Build backend JAR
        run: |
          cd editor/backend
          mvn package -DskipTests -q

      - name: Build runtime JAR
        run: |
          cd runtime
          mvn package -DskipTests -q

      - name: Build embedded runtime modules
        run: |
          cd embedded-runtime
          mvn package -DskipTests -q

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: arvexis-editor-jar
          path: editor/backend/target/editor-backend-*.jar
          retention-days: 14

      - name: Upload embedded runtime artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arvexis-embedded-runtime-jars
          path: |
            embedded-runtime/embedded-runtime-core/target/embedded-runtime-core-*.jar
            embedded-runtime/embedded-runtime-player-web/target/embedded-runtime-player-web-*.jar
            embedded-runtime/embedded-runtime-spring-boot-starter/target/embedded-runtime-spring-boot-starter-*.jar
            embedded-runtime/embedded-runtime-spring-data-jpa/target/embedded-runtime-spring-data-jpa-*.jar
            embedded-runtime/embedded-runtime-testkit/target/embedded-runtime-testkit-*.jar
          retention-days: 14

  test:
    name: Run editor + runtime tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run backend tests
        run: |
          cd editor/backend
          mvn test -q

      - name: Run runtime tests
        run: |
          cd runtime
          mvn test -q

      - name: Run embedded runtime tests
        run: |
          cd embedded-runtime
          mvn test -q
